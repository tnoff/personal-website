matrix:
- name: html
  dictionary:
    wordlists:
      - .spellcheck/wordlist.txt
  pipeline:
  - pyspelling.filters.html:
      comments: false
      attributes:
      - title
      - alt
      ignores:
      - :matches(code, pre)
      - a:matches(.magiclink-compare, .magiclink-commit)
      - span.keys
      - :matches(.MathJax_Preview, .md-nav__link, .md-footer-custom-text, .md-source__repository, .headerlink, .md-icon)
  sources:
  - hugo-site/layouts/**/*.html
  - hugo-site/content/*.html
