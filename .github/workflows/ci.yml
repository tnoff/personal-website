name: CI

on:
  - pull_request

jobs:
  check-pins:
    uses: tnoff/github-workflows/.github/workflows/check-action-pins.yml@5a3473dcbf9095c0e2137fa209bf1d10bc9f791f
  spellback:
    name: Spellcheck
    runs-on: ubuntu-24.04
    steps:
    # The checkout step
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - uses: rojopolis/spellcheck-github-actions@e3cd8e9aec4587ec73bc0e60745aafd45c37aa2e
      name: Spellcheck
      with:
        config_path: .spellcheck/spellcheck.yml
  docker:
    name: Docker build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
    - name: Build image
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
      with:
        push: false

  changes:
    name: Detect file changes
    runs-on: ubuntu-24.04
    outputs:
      resume: ${{ steps.filter.outputs.resume }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
      id: filter
      with:
        filters: |
          resume:
            - 'Tyler_North_CV.yaml'
            - 'generate.py'
            - 'Dockerfile.generate'

  generate-check:
    name: Resume content is up to date
    needs: changes
    if: ${{ needs.changes.outputs.resume == 'true' }}
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Build generate image
      run: docker build -f Dockerfile.generate -t tyler-north-generate .
    - name: Run generate
      run: docker run --rm -v "$PWD:/work" -w /work tyler-north-generate python generate.py
    - name: Check generated files are up to date
      run: git diff --exit-code hugo-site/content/resume.html hugo-site/content/projects.html
