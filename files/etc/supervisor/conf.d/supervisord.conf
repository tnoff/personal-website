[program:gunicorn]
command=/usr/local/bin/gunicorn-start.sh
process_name=gunicorn
stdout_logfile=/logs/supervisor/gunicorn.log
stdout_logfile_backups=3
stderr_logfile=/logs/supervisor/gunicorn-error.log
stderr_logfile_backups=3

[program:nginx]
command=/usr/sbin/nginx -g 'daemon on; master_process on;'
process_name=nginx
stdout_logfile=/logs/supervisor/nginx.log
stdout_logfile_backups=3
stderr_logfile=/logs/supervisor/nginx-error.log
stderr_logfile_backups=3

[program:cron]
command=/usr/sbin/cron
process_name=cron
stdout_logfile=/logs/supervisor/cron.log
stdout_logfile_backups=2
stderr_logfile=/logs/supervisor/cron-error.log
stderr_logfile_backups=2
