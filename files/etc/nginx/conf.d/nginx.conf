server {
    listen 8082;
    listen [::]:8082;
    server_name tyler-north.com;
    return 301 https://$host$request_uri;
}

server {
    listen 8084;
    listen [::]:8084;
    server_name tyler-north.com;

    error_log /logs/error.log warn;
    access_log /logs/nginx-access.log;

    location /static/ {
        root /opt/website;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;
    }
}

