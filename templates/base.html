<!doctype html>
{% load bootstrap5 %}
{% load bootstrap_icons %}
{% bootstrap_css %}
{% bootstrap_javascript %}

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>tyler-north.com</title>
    </head>

    <!-- Custom CSS Styles -->
    <style type="text/css">
        body {
            background-color: #F5FAFA;
        }

        nav {
            background-color: #ACD1E9;
            padding-left: 15px;
            padding-right: 15px;
        }

        #main-page {
            padding-left: 30px;
            padding-right: 30px;
        }
    </style>

    <body>
        <!-- Top Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">tyler-north.com</a>
            </div>
        </nav>

        <!-- Main content block -->
        <div id="main-page">
        {% block content %}
        {% endblock %}
        </div>
    </body>
</html>
