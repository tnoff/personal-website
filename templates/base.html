<!doctype html>
{% load django_bootstrap5 %}
{% load bootstrap_icons %}
{% bootstrap_css %}
{% bootstrap_javascript %}

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>tyler-north.com</title>
    </head>

    <!-- Custom CSS Styles -->
    <style type="text/css">
        body {
            background-color: #cee5ef;
            font-family: Garamond, serif;
            
        }
        a {
            color: #083a87;
            background-color: transparent;
            text-decoration: none;
        }
        p {
            font-size: 20px;
            color: #141616;
        }
        li {
            font-size: 20px;
            color: #141616;  
        }
        footer {
            padding-top: 20px;
            left: 0;
            bottom: 0;
            width: 100%;
            text-align: center;
        }
        .header {
            padding-top: 15px;
            color: #141616;
        }
    </style>

    <body>
        <nav class="navbar navbar-expand-sm justify-content-center">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li>_</li>
                <li class="nav-item">
                    <a class="nav-link" href="/resume">Resume</a>
                </li>
                <li>_</li>
                <li class="nav-item">
                    <a class="nav-link" href="/projects">Projects</a>
                </li>
            </ul>
        </nav> 
        <!-- Main content block -->
        <div class="container">
        {% block content %}
        {% endblock %}
        </div>
        <footer>
            <p>Author: Tyler North. Last updated 2025.</p>
        </footer>
    </body>
</html>
