<!doctype html>
{% load django_bootstrap5 %}
{% load bootstrap_icons %}
{% bootstrap_css %}
{% bootstrap_javascript %}

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>tyler-north.com</title>
    </head>

    <!-- Custom CSS Styles -->
    <style type="text/css">
        body {
            background-color: #c7cbcc;
            font-family: Garamond, serif;
        }
        a {
            color: #083a87;
            background-color: transparent;
        }
        p {
            font-size: 20px;
            color: #141616;
        }
        li {
            font-size: 20px;
            color: #141616;  
        }
        footer {
            padding-top: 20px;
            left: 0;
            bottom: 0;
            width: 100%;
            text-align: center;
        }
        .header {
            padding-top: 15px;
            color: #141616;
        }
        .nav-item {
            font-family: Garamond, serif;
            color: #141616; 
        }
        .nav-link {
            text-decoration: underline;
        }
    </style>

    <body>
        <nav class="navbar">
            <div class="navbar-nav mx-auto d-flex flex-row gap-3">
                <a class="nav-link fs-4" href="/">Homepage</a>
                <a class="nav-link fs-4" href="/resume">Resume</a>
                <a class="nav-link fs-4" href="/projects">Projects</a>
            </div>
        </nav>

        <!-- Main content block -->
        <div class="container">
        {% block content %}
        {% endblock %}
        </div>
        <footer>
            <p>Author: Tyler North. Last updated 2025.</p>
        </footer>
    </body>
</html>
