<!doctype html>
{% load django_bootstrap5 %}
{% load bootstrap_icons %}
{% bootstrap_css %}
{% bootstrap_javascript %}

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>tyler-north.com</title>
    </head>

    <!-- Custom CSS Styles -->
    <style type="text/css">
        body {
            background-color: #EDEDED;
        }

        nav {
            background-color: #C6D1D9;
            padding-left: 15px;
            padding-right: 15px;
        }

        #main-page {
            padding-left: 30px;
            padding-right: 30px;
        }
        #header {
            padding-top: 15px;
            color: #3D3D3D;
        }
        ul {
            list-style-position: inside;
        }
        li {
            font-size: 20px;
        }
        p {
            font-size: 20px;
        }
    </style>

    <body>
        <!-- Main content block -->
        <nav class="navbar navbar-expand-sm justify-content-center">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/resume">Resume</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/projects">Projects</a>
                </li>
            </ul>
        </nav> 
        <div id="main-page">
        {% block content %}
        {% endblock %}
        </div>
    </body>
</html>
