{% extends "base.html" %}
{% block content %}
<!-- Custom CSS Styles -->
<style type="text/css">
    #error-list{
        color: red
    }
</style>
<h2 align="center">Task Create</h2>

<p>{{errors}}</p>

<div align="center">
    <form action="/0d27c6b9-a5d7-4782-9438-93b54b8f98f8/create/" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="message">Message</label>
            <input id="message" type="text" maxlength="255" name="message">
        </div>
        <div class="form-group">
            <label for="day_of_week">Day of Week</label>
            <select class="form-control" name="day_of_week" id="day_of_week">
                <option value=0>Monday</option>
                <option value=1>Tuesday</option>
                <option value=2>Wednesday</option>
                <option value=3>Thursday</option>
                <option value=4>Friday</option>
                <option value=5>Saturday</option>
                <option value=6>Sunday</option>
            </select>
        </div>
        <div class="form-group">
            <label for="week_offset">On the Xth Week</label>
            <select class="form-control" name="week_offset" id="week_offset">
                <option value=1>1</option>
                <option value=2>2</option>
                <option value=3>3</option>
                <option value=4>4</option>
            </select>
        </div>
        <div class="form-group">
            <label for="month_offset">Off every Y Month</label>
            <select class="form-control" name="month_offset" id="month_offset">
                <option value=0>0</option>
                <option value=1>1</option>
                <option value=2>2</option>
                <option value=3>3</option>
                <option value=4>4</option>
                <option value=5>5</option>
                <option value=6>6</option>
            </select>
        </div>
        <div class="form-group">
            <label for="due_date">First Due Date</label>
            <input type="date" id="due_date" name="due_date">
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
{% endblock %}
